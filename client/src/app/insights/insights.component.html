<div class="text-center mt-3">
  <h2>{{getTitle()}}</h2>
</div>

<!-- whatever button we click, the button group sets the predicate and displays appropriate results -->
<div class="container mt-3">
  <div class="d-flex">
    <div class="btn-group">
      <button class="btn btn-primary" btnRadio="followed" [(ngModel)]="predicate" (click)="loadFollowers()">Members I follow</button>

      <button class= "btn btn-primary" btnRadio="followedBy" [(ngModel)]="predicate" (click)="loadFollowers()">Members who follow me</button>

      <button class= "btn btn-primary" btnRadio="mutual" [(ngModel)]="predicate" (click)="loadFollowers()">Mutual</button>
    </div>
  </div>

  <div class="row mt-3">
    @for (member of likesService.paginatedResult()?.items; track member.id) {
      <div class="col-2">
        <app-member-card [member]="member"></app-member-card>
      </div>
    }
  </div>

  @if(likesService.paginatedResult()?.pagination){
    <div class="d-flex justify-content-center">
    <pagination 
      [boundaryLinks]="true"
      [totalItems]="likesService.paginatedResult()?.pagination!.totalItems"
      [itemsPerPage]="likesService.paginatedResult()?.pagination!.itemsPerPage"
      (pageChanged)="pageChanged($event)"
      [(ngModel)]="likesService.paginatedResult()?.pagination!.currentPage"
      [maxSize]="10"
      previousText="&lsaquo;"
      nextText="&rsaquo;"
      firstText="&laquo;"
      lastText="&raquo;">
  </pagination>
  </div>
  }
